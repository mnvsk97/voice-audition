[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voice-audition"
version = "0.3.0"
description = "Build and maintain a rich voice catalog across TTS providers"
readme = "README.md"
requires-python = ">=3.11"
license = "MIT"
dependencies = [
    "httpx>=0.27",
    "click>=8.0",
    "moss>=1.0",
]

[project.optional-dependencies]
enrich = ["mlx-audio>=0.1"]
mcp = ["fastmcp>=2.0"]

[project.scripts]
voice-audition = "voice_audition.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/voice_audition"]
