[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "voice-audition"
version = "0.1.0"
description = "Audition TTS voices for your AI agent — cross-provider voice casting based on your business context"
requires-python = ">=3.10"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.27.0",
    "typer>=0.9.0",
    "pydantic>=2.0.0",
    "rich>=13.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "httpx>=0.27.0",
]

[project.scripts]
voice-audition = "voice_audition.cli:app"
