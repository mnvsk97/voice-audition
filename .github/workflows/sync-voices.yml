name: Sync Voice Catalog

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly on Monday at 6am UTC
  workflow_dispatch: # Manual trigger

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Sync all providers
        run: python scripts/sync_all.py

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet catalog/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "VoiceAudition Bot"
          git config user.email "bot@voiceaudition.dev"
          git add catalog/
          VOICE_COUNT=$(python -c "import json, pathlib; print(sum(len(json.loads(f.read_text())) for f in pathlib.Path('catalog').glob('*.json')))")
          git commit -m "sync: update voice catalog ($VOICE_COUNT voices)"
          git push
