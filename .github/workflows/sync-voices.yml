name: Voice Pipeline

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install
        run: pip install -e .

      - name: Pipeline (sync + enrich + index)
        run: voice-audition pipeline
        env:
          # TTS provider keys (for sync + audio sample generation)
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          CARTESIA_API_KEY: ${{ secrets.CARTESIA_API_KEY }}
          DEEPGRAM_API_KEY: ${{ secrets.DEEPGRAM_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          PLAYHT_API_KEY: ${{ secrets.PLAYHT_API_KEY }}
          RIME_API_KEY: ${{ secrets.RIME_API_KEY }}
          # Enrichment LLM
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Moss search index
          MOSS_PROJECT_ID: ${{ secrets.MOSS_PROJECT_ID }}
          MOSS_PROJECT_KEY: ${{ secrets.MOSS_PROJECT_KEY }}

      - name: Monitor
        run: voice-audition monitor
        continue-on-error: true

      - name: Commit changes
        run: |
          git diff --quiet catalog/ && exit 0
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add catalog/
          git commit -m "Pipeline run $(date +%Y-%m-%d)"
          git push
